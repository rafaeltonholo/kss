<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>KSS — CSS AST Explorer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            visibility: hidden;
        }

        #loading-container {
            visibility: visible;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            z-index: 9999;
        }

        #loading-container p {
            margin-top: 16px;
            color: #858585;
            font-family: system-ui, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="loading-container">
    <svg height="40" role="presentation" viewBox="0 0 50 50" width="40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" fill="none" r="20" stroke="#3e3e42" stroke-width="4"/>
        <circle cx="25" cy="25" fill="none" r="20" stroke="#569cd6" stroke-dasharray="90 125" stroke-linecap="round"
                stroke-width="4">
            <animateTransform attributeName="transform" dur="1s" from="0 25 25" repeatCount="indefinite" to="360 25 25"
                              type="rotate"/>
        </circle>
    </svg>
    <p>Loading KSS Explorer...</p>
</div>
<script type="module">
    import {_initialize} from './web.mjs';

    await _initialize();
    document.getElementById('loading-container')?.remove();
    document.body.style.visibility = 'visible';
</script>
</body>
</html>
